name: build-native

# Build the WinUI 3 (unpackaged, self-contained) native UI.
# - push to main / PR touching native-ui: compile check + upload zip artifact
# - manual run: upload zip artifact
# - push a tag like native-v1.0.0: publish a GitHub Release with the zip attached
on:
  push:
    branches: [main]
    paths: ["native-ui/**", ".github/workflows/native-build.yml"]
    tags: ["v*"]
  pull_request:
    paths: ["native-ui/**", ".github/workflows/native-build.yml"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Publish (self-contained, unpackaged)
        run: >
          dotnet publish native-ui/DiscordTranscriber.Native.csproj
          -c Release -r win-x64 --self-contained true
          -p:WindowsAppSDKSelfContained=true -p:WindowsPackageType=None

      - name: Package zip
        id: pack
        shell: pwsh
        run: |
          $ver = if ($env:GITHUB_REF -like 'refs/tags/*') { ($env:GITHUB_REF -replace 'refs/tags/','') -replace '^v','' } else { $env:GITHUB_SHA.Substring(0,7) }
          $pub = "native-ui/bin/Release/net10.0-windows10.0.19041.0/win-x64/publish"
          $name = "whispercord-native-$ver-win-x64.zip"
          Compress-Archive -Path "$pub/*" -DestinationPath $name -CompressionLevel Optimal
          "asset=$name" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "{0:N1} MB" -f ((Get-Item $name).Length / 1MB) | Write-Host

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: DiscordTranscriber-Native
          path: ${{ steps.pack.outputs.asset }}

      - name: Publish release (v* tags)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.pack.outputs.asset }}
          generate_release_notes: true
