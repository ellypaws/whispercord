name: build-release

# Build the packaged Windows app. Pushing a tag like v1.0.0 publishes a GitHub Release with
# the zipped app attached; a manual run just uploads the zip as a workflow artifact.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Stamp version from tag
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        run: |
          ver="${GITHUB_REF#refs/tags/}"; ver="${ver#v}"
          sed -i "s/^_STAMP = \"0.0.0-dev\".*/_STAMP = \"$ver\"/" src/version.py
          grep -n '^_STAMP' src/version.py

      - name: Build (single .exe)
        env:
          VT_ONEFILE: "1"
        run: pyinstaller discord-transcriber.spec --noconfirm

      - name: Name the exe
        shell: pwsh
        run: |
          $ver = if ($env:GITHUB_REF -like 'refs/tags/*') { ($env:GITHUB_REF -replace 'refs/tags/','') -replace '^v','' } else { $env:GITHUB_SHA.Substring(0,7) }
          $name = "whispercord-$ver-win-x64.exe"
          Copy-Item dist/DiscordTranscriber.exe $name
          "ASSET=$name" | Out-File -FilePath $env:GITHUB_ENV -Append
          "{0:N1} MB" -f ((Get-Item $name).Length / 1MB) | Write-Host

      - name: Upload artifact (manual runs)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: DiscordTranscriber
          path: ${{ env.ASSET }}

      - name: Publish release (tag pushes)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.ASSET }}
          generate_release_notes: true
